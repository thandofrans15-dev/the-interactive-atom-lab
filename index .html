<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TF Interactive Atom Lab</title>
    <style>
        body { background-color: #0a0a0c; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        h1 { margin-top: 20px; color: #FFD700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        
        .periodic-table { display: grid; grid-template-columns: repeat(18, 1fr); gap: 5px; padding: 20px; }
        
        .element { 
            width: 50px; height: 60px; border: 1px solid #333; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; background: rgba(255, 255, 255, 0.05);
        }
        .element:hover { border-color: #FFD700; background: rgba(255, 215, 0, 0.2); transform: scale(1.1); z-index: 10; }
        .symbol { font-weight: bold; font-size: 1.2em; }
        .number { font-size: 0.7em; color: #aaa; }

        /* Your TF Logo */
        .tf-logo { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>INTERACTIVE ATOM LAB</h1>
    <div class="periodic-table" id="table"></div>

    <div class="tf-logo">
<svg viewBox="0 0 100 100" xmlns="http://w3.org">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Main vertical stem for both T and F -->
  <rect x="45" y="15" width="10" height="70" rx="3" fill="url(#goldGrad)" />
  <!-- The Top Bar of the T -->
  <rect x="25" y="15" width="50" height="10" rx="3" fill="url(#goldGrad)" />
  <!-- The small horizontal line for the F -->
  <rect x="45" y="45" width="25" height="10" rx="3" fill="url(#goldGrad)" />
</svg>

    <script>
        // Start with Hydrogen and Helium to test the layout
        const elements = [
            {n: 1, s: 'H'}, {n: 0, s: ''}, {n: 0, s: ''}, {n: 0, s: ''}, {n: 0, s: ''}, {n: 0, s: ''}, {n: 0, s: ''}, {n: 0, s: ''}, {n: 0, s: ''}, {n: 0, s: ''}, {n: 0, s: ''}, {n: 0, s: ''}, {n: 0, s: ''}, {n: 0, s: ''}, {n: 0, s: ''}, {n: 0, s: ''}, {n: 0, s: ''}, {n: 2, s: 'He'}
        ];
        const table = document.getElementById('table');
        elements.forEach(el => {
            const div = document.createElement('div');
            div.className = 'element';
            if(el.n === 0) div.style.visibility = 'hidden';
            div.innerHTML = `<span class="number">${el.n}</span><span class="symbol">${el.s}</span>`;
            div.onclick = () => alert(`Opening 3D ${el.s} Model...`);
            table.appendChild(div);
        });
    </script>
</body>
</html>
