<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TF Interactive Atom Lab</title>
    <style>
        /* THE PS3-INSPIRED GRADIENT BASE */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(90deg, #4da6ff 0%, #4da6ff 60%, #000000 100%);
            color: white;
            overflow-x: hidden;
        }

        /* NAVIGATION LOGIC */
        #home-page, #table-page {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            transition: opacity 0.5s ease;
        }

        #table-page { opacity: 0; pointer-events: none; }

        /* THE BATARANG TF LOGO */
        .tf-logo-container {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6));
        }

        .batarang-tf {
            transform: skewX(-10deg); /* The sharp slanted look */
        }

        /* BUTTONS */
        .btn {
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid #FFD700;
            color: #FFD700;
            padding: 15px 40px;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 30px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: #FFD700;
            color: black;
            box-shadow: 0 0 20px #FFD700;
        }

        /* PERIODIC TABLE GRID */
        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, 1fr);
            gap: 8px;
            padding: 20px;
        }

        .element {
            width: 55px;
            height: 65px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.4);
            transition: 0.3s;
        }

        .element:hover {
            border-color: #FFD700;
            transform: scale(1.1);
            background: rgba(255, 215, 0, 0.2);
        }
    </style>
</head>
<body>

    <!-- HOME PAGE -->
    <div id="home-page">
        <div class="tf-logo-container">
            <svg viewBox="0 0 100 100" class="batarang-tf">
                <defs>
                    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#FFD700;" />
                        <stop offset="100%" style="stop-color:#FFA500;" />
                    </linearGradient>
                </defs>
                <circle cx="50" cy="50" r="45" fill="none" stroke="url(#goldGrad)" stroke-width="4" />
                <rect x="45" y="20" width="10" height="60" fill="url(#goldGrad)" /> <!-- Stem -->
                <rect x="25" y="20" width="50" height="10" fill="url(#goldGrad)" /> <!-- T-Bar -->
                <rect x="45" y="45" width="25" height="10" fill="url(#goldGrad)" /> <!-- F-Bar -->
            </svg>
        </div>
        <h1>TF INNOVATIONS</h1>
        <button class="btn" onclick="showTable()">Enter Lab</button>
    </div>

    <!-- PERIODIC TABLE PAGE -->
    <div id="table-page">
        <button class="btn" style="margin-bottom:20px;" onclick="showHome()">Back to Home</button>
        <div class="periodic-table" id="table"></div>
    </div>

    <script>
        function showTable() {
            document.getElementById('home-page').style.opacity = '0';
            document.getElementById('home-page').style.pointerEvents = 'none';
            document.getElementById('table-page').style.opacity = '1';
            document.getElementById('table-page').style.pointerEvents = 'auto';
        }

        function showHome() {
            document.getElementById('table-page').style.opacity = '0';
            document.getElementById('table-page').style.pointerEvents = 'none';
            document.getElementById('home-page').style.opacity = '1';
            document.getElementById('home-page').style.pointerEvents = 'auto';
        }

        // Generate Basic Elements
        const elements = [{n: 1, s: 'H'}, {n: 2, s: 'He'}];
        const table = document.getElementById('table');
        elements.forEach(el => {
            const div = document.createElement('div');
            div.className = 'element';
            div.innerHTML = `<span style="font-size:0.7em;">${el.n}</span><span style="font-weight:bold;">${el.s}</span>`;
            table.appendChild(div);
        });
    </script>
</body>
</html>
