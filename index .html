<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TF Interactive Atom Lab</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            /* SOFTER GRADIENT: No hard lines, pure PS3 glow */
            background: radial-gradient(circle at 30% 30%, #4da6ff 0%, #1a3a5c 40%, #000000 80%);
            color: white; overflow-x: hidden;
        }

        #home-page, #table-page {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: absolute;
            transition: opacity 0.6s ease-in-out;
        }

        #table-page { opacity: 0; pointer-events: none; }

        /* THE SHARP BATARANG LOGO */
        .tf-logo-container {
            width: 200px; height: 200px;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.7));
            transform: skewX(-12deg); /* The sharp slant */
        }

        .btn {
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid #FFD700;
            color: #FFD700;
            padding: 15px 45px;
            font-size: 1.1em;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.4s;
            letter-spacing: 3px;
            margin-top: 30px;
        }

        .btn:hover {
            background: #FFD700; color: black;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
        }
    </style>
</head>
<body>

    <div id="home-page">
        <div class="tf-logo-container">
            <svg viewBox="0 0 100 100" xmlns="http://w3.org">
                <defs>
                    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#FFD700;" />
                        <stop offset="100%" style="stop-color:#FFA500;" />
                    </linearGradient>
                </defs>
                <!-- POINTY BATARANG T AND F -->
                <path d="M45,85 L55,85 L55,25 L75,25 L75,15 L25,15 L25,25 L45,25 Z" fill="url(#goldGrad)" /> <!-- T -->
                <path d="M55,45 L80,45 L80,55 L55,55 Z" fill="url(#goldGrad)" /> <!-- F bar -->
                
                <!-- CIRCLE STEMMING FROM BOTTOM -->
                <path d="M50,85 C20,85 5,65 5,45 C5,20 25,5 50,5 C75,5 95,20 95,45" 
                      fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" />
            </svg>
        </div>
        <h1 style="letter-spacing: 5px; margin-top: 20px;">TF INNOVATIONS</h1>
        <button class="btn" onclick="showTable()">Enter Lab</button>
    </div>

    <div id="table-page">
        <button class="btn" onclick="showHome()">Back to Home</button>
        <div id="table" style="display:grid; grid-template-columns: repeat(18, 1fr); gap: 10px; padding: 20px;"></div>
    </div>

    <script>
        function showTable() {
            document.getElementById('home-page').style.opacity = '0';
            document.getElementById('home-page').style.pointerEvents = 'none';
            document.getElementById('table-page').style.opacity = '1';
            document.getElementById('table-page').style.pointerEvents = 'auto';
        }
        function showHome() {
            document.getElementById('table-page').style.opacity = '0';
            document.getElementById('table-page').style.pointerEvents = 'none';
            document.getElementById('home-page').style.opacity = '1';
            document.getElementById('home-page').style.pointerEvents = 'auto';
        }
    </script>
</body>
</html>
